{% extends 'base.html' %}
{% block title %}Crear cuenta{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <span class="text-5xl">⚜️</span>
      <h1 class="font-display text-2xl font-black text-forest-900 mt-3 mb-1">Únete a ScoutRepo</h1>
      <p class="text-stone-500 text-sm">Crea tu cuenta y empieza a compartir actividades con la comunidad.</p>
    </div>

    <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-8">
      <form method="POST" action="{{ url_for('auth.register') }}" novalidate>

        <div class="space-y-5">
          <div>
            <label for="username" class="block text-sm font-semibold text-stone-700 mb-1.5">Nombre de usuario</label>
            <input type="text" id="username" name="username"
                   value="{{ username|default('') }}"
                   placeholder="tu_nombre_scout" autocomplete="username"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500 focus:border-transparent" />
          </div>

          <div>
            <label for="email" class="block text-sm font-semibold text-stone-700 mb-1.5">Correo electrónico</label>
            <input type="email" id="email" name="email"
                   value="{{ email|default('') }}"
                   placeholder="tu@correo.es" autocomplete="email"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500 focus:border-transparent" />
          </div>

          <div>
            <label for="password" class="block text-sm font-semibold text-stone-700 mb-1.5">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="Mínimo 8 caracteres"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500 focus:border-transparent" />
          </div>

          <div>
            <label for="confirm_password" class="block text-sm font-semibold text-stone-700 mb-1.5">Confirmar contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Repite la contraseña"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500 focus:border-transparent" />
          </div>
        </div>

        <button type="submit"
                class="mt-6 w-full bg-forest-700 text-white font-semibold py-3 rounded-xl hover:bg-forest-900 transition-colors">
          Crear cuenta
        </button>

      </form>
    </div>

    <p class="text-center text-sm text-stone-500 mt-6">
      ¿Ya tienes cuenta?
      <a href="{{ url_for('auth.login') }}" class="font-semibold text-forest-700 hover:text-forest-900 transition-colors">
        Inicia sesión
      </a>
    </p>

  </div>
</div>
{% endblock %}
