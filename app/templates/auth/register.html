{% extends 'base.html' %}
{% block title %}Crear cuenta{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">

    <div class="text-center mb-6 flex flex-col items-center">
      <div class="w-12 h-12 rounded-2xl bg-emerald-50 border border-emerald-100 flex items-center justify-center text-emerald-600 shadow-sm mb-3">
        <i class="fa-solid fa-compass text-xl"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">Únete a ScoutAct</h1>
      <p class="text-xs text-slate-500 mt-0.5">Crea tu cuenta y empieza a compartir actividades con la comunidad.</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
      <form method="POST" action="{{ url_for('auth.register') }}" novalidate>

        <div class="space-y-4">
          <div>
            <label for="username" class="block text-xs font-bold text-slate-700 mb-1">Nombre de usuario</label>
            <input type="text" id="username" name="username" value="{{ username|default('') }}"
                   placeholder="tu_nombre_scout" autocomplete="username"
                   class="w-full border border-slate-200 bg-slate-50/40 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all shadow-sm" />
          </div>

          <div>
            <label for="email" class="block text-xs font-bold text-slate-700 mb-1">Correo electrónico</label>
            <input type="email" id="email" name="email" value="{{ email|default('') }}"
                   placeholder="tu@correo.es" autocomplete="email"
                   class="w-full border border-slate-200 bg-slate-50/40 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all shadow-sm" />
          </div>

          <div>
            <label for="password" class="block text-xs font-bold text-slate-700 mb-1">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="Mínimo 8 caracteres"
                   class="w-full border border-slate-200 bg-slate-50/40 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all shadow-sm" />
          </div>

          <div>
            <label for="confirm_password" class="block text-xs font-bold text-slate-700 mb-1">Confirmar contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Repite la contraseña"
                   class="w-full border border-slate-200 bg-slate-50/40 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all shadow-sm" />
          </div>
        </div>

        <button type="submit"
                class="mt-5 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-3 rounded-xl transition-colors shadow-sm shadow-emerald-100 flex items-center justify-center gap-2">
          <i class="fa-solid fa-user-plus"></i>
          <span>Crear cuenta</span>
        </button>

      </form>
    </div>

    <p class="text-center text-xs text-slate-500 mt-5 font-medium">
      ¿Ya tienes cuenta?
      <a href="{{ url_for('auth.login') }}" class="font-bold text-emerald-600 hover:text-emerald-700 transition-colors">
        Inicia sesión
      </a>
    </p>

  </div>
</div>
{% endblock %}
