{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <span class="text-5xl">⚜️</span>
      <h1 class="font-display text-2xl font-black text-forest-900 mt-3 mb-1">Bienvenido de nuevo</h1>
      <p class="text-stone-500 text-sm">Inicia sesión para subir y gestionar actividades.</p>
    </div>

    <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-8">
      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

        <div class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-semibold text-stone-700 mb-1.5">Correo electrónico</label>
            <input type="email" id="email" name="email" value="{{ email|default('') }}"
                   placeholder="tu@correo.es" autocomplete="email"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500 focus:border-transparent" />
          </div>

          <div>
            <label for="password" class="block text-sm font-semibold text-stone-700 mb-1.5">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="Tu contraseña"
                   class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500 focus:border-transparent" />
          </div>

          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="remember" class="accent-forest-700 w-4 h-4">
            <span class="text-sm text-stone-600">Recordar sesión</span>
          </label>
        </div>

        <button type="submit"
                class="mt-6 w-full bg-forest-700 text-white font-semibold py-3 rounded-xl hover:bg-forest-900 transition-colors">
          Iniciar sesión
        </button>

      </form>
    </div>

    <p class="text-center text-sm text-stone-500 mt-6">
      ¿No tienes cuenta?
      <a href="{{ url_for('auth.register') }}" class="font-semibold text-forest-700 hover:text-forest-900 transition-colors">
        Regístrate gratis
      </a>
    </p>

  </div>
</div>
{% endblock %}
