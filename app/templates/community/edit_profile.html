{% extends 'base.html' %}
{% block title %}Editar perfil{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <div class="mb-8">
    <a href="{{ url_for('community.profile', username=user.username) }}"
       class="inline-flex items-center gap-2 text-sm text-stone-500 hover:text-forest-700 transition-colors mb-4">
       ← Volver al perfil
    </a>
    <h1 class="font-display text-2xl font-black text-stone-900">Editar perfil</h1>
  </div>

  <form method="POST" action="{{ url_for('community.edit_profile', username=user.username) }}" novalidate>
    <div class="space-y-5">

      <!-- Username (read-only) -->
      <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6">
        <label class="block text-sm font-semibold text-stone-700 mb-1.5">Usuario</label>
        <input type="text" value="{{ user.username }}" disabled
               class="w-full border border-stone-100 rounded-xl px-4 py-3 text-sm bg-stone-50 text-stone-400 cursor-not-allowed" />
        <p class="text-xs text-stone-400 mt-1.5">El nombre de usuario no se puede cambiar.</p>
      </div>

      <!-- Grupo scout -->
      <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6">
        <label for="grupo_scout" class="block text-sm font-semibold text-stone-700 mb-1.5">
          Grupo Scout <span class="text-stone-400 font-normal">(opcional)</span>
        </label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 text-base select-none">⚜️</span>
          <input type="text" id="grupo_scout" name="grupo_scout"
                 value="{{ user.grupo_scout or '' }}"
                 placeholder="Ej: Grupo Scout San Jorge nº 42"
                 class="w-full pl-9 border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-500" />
        </div>
      </div>

      <!-- Redes sociales -->
      <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6">
        <h3 class="text-sm font-semibold text-stone-700 mb-4">Redes sociales <span class="text-stone-400 font-normal">(sin @, opcional)</span></h3>

        <div class="space-y-3">

          <!-- Instagram -->
          <div class="flex items-center gap-3">
            <span class="w-9 h-9 flex items-center justify-center shrink-0 text-pink-400">
              <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
              </svg>
            </span>
            <div class="flex-1 relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 text-sm font-semibold select-none">@</span>
              <input type="text" id="instagram" name="instagram"
                     value="{{ user.get_social('instagram') or '' }}"
                     placeholder="tu_usuario_instagram"
                     class="w-full pl-8 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent" />
            </div>
          </div>

          <!-- TikTok -->
          <div class="flex items-center gap-3">
            <span class="w-9 h-9 flex items-center justify-center shrink-0 text-stone-700">
              <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.28 8.28 0 0 0 4.83 1.54V6.78a4.85 4.85 0 0 1-1.06-.09z"/>
              </svg>
            </span>
            <div class="flex-1 relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 text-sm font-semibold select-none">@</span>
              <input type="text" id="tiktok" name="tiktok"
                     value="{{ user.get_social('tiktok') or '' }}"
                     placeholder="tu_usuario_tiktok"
                     class="w-full pl-8 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-800 focus:border-transparent" />
            </div>
          </div>

          <!-- X -->
          <div class="flex items-center gap-3">
            <span class="w-9 h-9 flex items-center justify-center shrink-0 text-stone-800">
              <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.258 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
              </svg>
            </span>
            <div class="flex-1 relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 text-sm font-semibold select-none">@</span>
              <input type="text" id="x" name="x"
                     value="{{ user.get_social('x') or '' }}"
                     placeholder="tu_usuario_x"
                     class="w-full pl-8 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-800 focus:border-transparent" />
            </div>
          </div>

        </div>
      </div>

    </div>

    <div class="flex justify-end gap-3 mt-6">
      <a href="{{ url_for('community.profile', username=user.username) }}"
         class="text-sm font-medium text-stone-500 hover:text-stone-700 px-4 py-2.5 transition-colors">
        Cancelar
      </a>
      <button type="submit"
              class="bg-forest-700 text-white font-semibold text-sm px-7 py-2.5 rounded-xl hover:bg-forest-900 transition-colors">
        Guardar cambios
      </button>
    </div>

  </form>
</div>
{% endblock %}
